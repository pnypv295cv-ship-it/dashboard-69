<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Operations Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0b1220;
font-family:Arial,sans-serif;
overflow:hidden;
}

header{
position:fixed;
top:0;
left:0;
right:0;
height:70px;
background:rgba(17,24,39,.9);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-between;
align-items:center;
padding:0 25px;
color:#fff;
z-index:1000;
border-bottom:1px solid #374151;
}

header h1{
font-size:28px;
font-weight:bold;
}

#clock{
font-size:18px;
color:#60a5fa;
font-weight:bold;
}

iframe{
position:absolute;
top:70px;
left:0;
width:100%;
height:calc(100vh - 70px);
border:none;
}

.floating-tools{
position:fixed;
bottom:20px;
left:20px;
display:flex;
gap:12px;
z-index:2000;
}

.tool-btn{
width:55px;
height:55px;
border-radius:50%;
background:rgba(17,24,39,.9);
backdrop-filter:blur(8px);
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
text-decoration:none;
color:#fff;
border:1px solid #374151;
transition:.25s;
}

.tool-btn:hover{
background:#2563eb;
transform:scale(1.1);
}

</style>

</head>

<body>

<header>

<h1>🌍 Operations Dashboard</h1>

<div id="clock"></div>

</header>

<iframe
src="https://demo.f4map.com/#lat=29.0483787&lon=48.6079119&zoom=5&camera.theta=0.9"
allowfullscreen>
</iframe>

<div class="floating-tools">

<a class="tool-btn"
href="https://firms.modaps.eosdis.nasa.gov/map/"
target="_blank"
rel="noopener noreferrer"
title="NASA FIRMS">
🔥
</a>

<a class="tool-btn"
href="https://www.windy.com"
target="_blank"
rel="noopener noreferrer"
title="Windy">
🌦️
</a>

<a class="tool-btn"
href="https://globe.adsbexchange.com"
target="_blank"
rel="noopener noreferrer"
title="ADS-B Exchange">
✈️
</a>

<a class="tool-btn"
href="https://www.marinetraffic.com"
target="_blank"
rel="noopener noreferrer"
title="MarineTraffic">
🚢
</a>

<a class="tool-btn"
href="https://web.telegram.org"
target="_blank"
rel="noopener noreferrer"
title="Telegram">
💬
</a>

</div>

<script>

function updateClock(){

document.getElementById("clock").innerHTML =
new Intl.DateTimeFormat('en-GB',{
timeZone:'Asia/Dubai',
dateStyle:'medium',
timeStyle:'medium'
}).format(new Date());

}

updateClock();

setInterval(updateClock,1000);

</script>

</body>
</html>
