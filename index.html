```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operations Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0b1220;
font-family:Arial,sans-serif;
color:white;
height:100vh;
overflow:hidden;
}

header{
height:70px;
background:#111827;
border-bottom:1px solid #1f2937;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
}

header h1{
font-size:26px;
}

#clock{
color:#60a5fa;
}

.container{
display:grid;
grid-template-columns:1.7fr 320px;
height:calc(100vh - 70px);
}

.map-panel{
height:100%;
background:#000;
}

.map-panel iframe{
width:100%;
height:100%;
border:none;
}

.sidebar{
background:#111827;
border-left:1px solid #1f2937;
overflow-y:auto;
padding:12px;
}

.card{
background:#0f172a;
border:1px solid #1f2937;
border-radius:12px;
padding:15px;
margin-bottom:12px;
}

.card h3{
margin-bottom:10px;
}

.btn{
display:block;
text-decoration:none;
text-align:center;
background:#2563eb;
color:white;
padding:10px;
border-radius:8px;
margin-top:8px;
}

.btn:hover{
background:#1d4ed8;
}

@media(max-width:1000px){

.container{
grid-template-columns:1fr;
}

.sidebar{
height:auto;
}

}

</style>
</head>
<body>

<header>
<h1>🌍 Operations Dashboard</h1>
<div id="clock"></div>
</header>

<div class="container">

<div class="map-panel">

<iframe
src="https://experience.arcgis.com/experience/0d4bf9c05c2e4d9badced014fd872916"
allowfullscreen>
</iframe>

</div>

<div class="sidebar">

<div class="card">
<h3>🔥 NASA FIRMS</h3>
<a class="btn"
href="https://firms.modaps.eosdis.nasa.gov/map/"
target="_blank">
Open
</a>
</div>

<div class="card">
<h3>🛰️ LandViewer</h3>
<a class="btn"
href="https://eos.com/landviewer/"
target="_blank">
Open
</a>
</div>

<div class="card">
<h3>✈️ Telegram</h3>
<a class="btn"
href="https://web.telegram.org"
target="_blank">
Open
</a>
</div>

<div class="card">
<h3>𝕏 X</h3>
<a class="btn"
href="https://x.com"
target="_blank">
Open
</a>
</div>

<div class="card">
<h3>📊 INSS</h3>
<a class="btn"
href="https://www.inss.org.il/"
target="_blank">
Open
</a>
</div>

<div class="card">
<h3>🇦🇪 ECSSR</h3>
<a class="btn"
href="https://www.ecssr.ae/en/home"
target="_blank">
Open
</a>
</div>

</div>

</div>

<script>

function updateClock(){
document.getElementById("clock").innerHTML =
new Date().toUTCString();
}

updateClock();
setInterval(updateClock,1000);

</script>

</body>
</html>
```
