<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operations Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0b1220;
font-family:Arial,sans-serif;
overflow:hidden;
}

header{
height:70px;
background:#111827;
border-bottom:1px solid #1f2937;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
color:white;
z-index:1000;
position:relative;
}

header h1{
font-size:28px;
}

#clock{
font-size:18px;
color:#60a5fa;
font-weight:bold;
}

iframe{
width:100%;
height:calc(100vh - 70px);
border:none;
display:block;
}

</style>
</head>

<body>

<header>

<h1>🌍 Operations Dashboard</h1>

<div id="clock"></div>

</header>

<iframe
src="https://demo.f4map.com/#lat=29.0483787&lon=48.6079119&zoom=5&camera.theta=0.9"
allowfullscreen>
</iframe>

<script>

function updateClock(){

document.getElementById("clock").innerHTML =
new Intl.DateTimeFormat('en-GB',{
timeZone:'Asia/Dubai',
dateStyle:'medium',
timeStyle:'medium'
}).format(new Date());

}

updateClock();

setInterval(updateClock,1000);

</script>

</body>
</html>
