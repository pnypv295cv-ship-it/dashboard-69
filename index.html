```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operations Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0b1220;
font-family:Arial,sans-serif;
color:white;
}

header{
padding:20px;
text-align:center;
border-bottom:1px solid #222;
}

header h1{
font-size:32px;
}

#clock{
margin-top:10px;
color:#60a5fa;
}

.container{
display:grid;
grid-template-columns:2fr 1fr;
gap:15px;
padding:15px;
height:calc(100vh - 100px);
}

#map{
height:100%;
border-radius:12px;
overflow:hidden;
}

.sidebar{
display:flex;
flex-direction:column;
gap:12px;
}

.card{
background:#111827;
border:1px solid #1f2937;
border-radius:12px;
padding:15px;
}

.card h3{
margin-bottom:10px;
}

.btn{
display:block;
text-decoration:none;
background:#2563eb;
color:white;
padding:10px;
margin-top:8px;
border-radius:8px;
text-align:center;
}

.btn:hover{
background:#1d4ed8;
}

.links{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

footer{
text-align:center;
padding:10px;
color:#999;
}
</style>
</head>

<body>

<header>
<h1>🌍 Operations Dashboard</h1>
<div id="clock"></div>
</header>

<div class="container">

<div id="map"></div>

<div class="sidebar">

<div class="card">
<h3>🔥 Monitoring</h3>

<a class="btn" href="https://firms.modaps.eosdis.nasa.gov/map/" target="_blank">
NASA FIRMS
</a>

<a class="btn" href="https://eos.com/landviewer/" target="_blank">
LandViewer
</a>
</div>

<div class="card">
<h3>📡 Communications</h3>

<a class="btn" href="https://web.telegram.org" target="_blank">
Telegram
</a>

<a class="btn" href="https://x.com" target="_blank">
X
</a>
</div>

<div class="card">
<h3>📚 Research</h3>

<div class="links">

<a class="btn" href="https://www.inss.org.il/" target="_blank">
INSS
</a>

<a class="btn" href="https://www.ecssr.ae/en/home" target="_blank">
ECSSR
</a>

</div>
</div>

</div>

</div>

<footer>
Personal Operations Dashboard
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([24,54],4);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

function updateClock(){
document.getElementById("clock").innerHTML =
new Date().toUTCString();
}

updateClock();
setInterval(updateClock,1000);
</script>

</body>
</html>
```
