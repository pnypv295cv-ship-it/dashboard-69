<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Operations Dashboard</title>

<style>
body{
    margin:0;
    background:#0d1117;
    color:white;
    font-family:Arial,sans-serif;
}

h1{
    text-align:center;
    padding:25px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:#161b22;
    border:1px solid #30363d;
    border-radius:12px;
    padding:20px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-4px);
}

a{
    color:#58a6ff;
    text-decoration:none;
}

h2{
    margin-top:0;
}
</style>
</head>

<body>

<h1>Personal Operations Dashboard</h1>

<div class="grid">

<div class="card">
<h2>🔥 NASA FIRMS</h2>
<a href="https://firms.modaps.eosdis.nasa.gov/map/" target="_blank">Open NASA FIRMS</a>
</div>

<div class="card">
<h2>🗺️ Google Maps</h2>
<a href="https://maps.google.com" target="_blank">Open Google Maps</a>
</div>

<div class="card">
<h2>🛰️ LandViewer</h2>
<a href="https://eos.com/landviewer/" target="_blank">Open LandViewer</a>
</div>

<div class="card">
<h2>✈️ Telegram</h2>
<a href="https://web.telegram.org" target="_blank">Open Telegram</a>
</div>

<div class="card">
<h2>𝕏 X</h2>
<a href="https://x.com" target="_blank">Open X</a>
</div>

<div class="card">
<h2>📊 INSS</h2>
<a href="https://www.inss.org.il/" target="_blank">Open INSS</a>
</div>

<div class="card">
<h2>🇦🇪 ECSSR</h2>
<a href="https://www.ecssr.ae/en/home" target="_blank">Open ECSSR</a>
</div>

</div>

</body>
</html>
