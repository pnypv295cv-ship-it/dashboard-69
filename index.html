```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operations Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:#0b1220;
font-family:Arial,sans-serif;
color:white;
}

header{
padding:15px;
background:#111827;
border-bottom:1px solid #1f2937;
text-align:center;
}

#clock{
margin-top:8px;
color:#60a5fa;
}

.topbar{
display:flex;
gap:10px;
padding:10px;
background:#111827;
flex-wrap:wrap;
justify-content:center;
}

.topbar input{
padding:10px;
border:none;
border-radius:8px;
min-width:180px;
}

.topbar button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
background:#2563eb;
color:white;
}

.container{
display:grid;
grid-template-columns:1.4fr 1fr;
gap:12px;
padding:12px;
height:calc(100vh - 170px);
}

#map{
height:100%;
border-radius:12px;
overflow:hidden;
}

.sidebar{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
overflow:auto;
}

.card{
background:#111827;
border:1px solid #1f2937;
border-radius:12px;
padding:15px;
}

.card h3{
margin-bottom:10px;
}

.btn{
display:block;
text-decoration:none;
background:#2563eb;
color:white;
padding:10px;
border-radius:8px;
margin-top:8px;
text-align:center;
}

.coords{
margin-top:10px;
font-size:14px;
color:#93c5fd;
word-break:break-all;
}

.copybtn{
margin-top:8px;
width:100%;
}

@media(max-width:1000px){
.container{
grid-template-columns:1fr;
height:auto;
}
#map{
height:500px;
}
.sidebar{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<header>
<h1>🌍 Personal Operations Dashboard</h1>
<div id="clock"></div>
</header>

<div class="topbar">

<input id="searchBox" placeholder="Search city or country">

<button onclick="searchPlace()">Search</button>

<input id="latBox" placeholder="Latitude">

<input id="lonBox" placeholder="Longitude">

<button onclick="goToCoords()">Go To Coordinates</button>

</div>

<div class="container">

<div id="map"></div>

<div class="sidebar">

<div class="card">
<h3>🔥 NASA FIRMS</h3>
<a class="btn" href="https://firms.modaps.eosdis.nasa.gov/map/" target="_blank">Open NASA FIRMS</a>
</div>

<div class="card">
<h3>🛰️ LandViewer</h3>
<a class="btn" href="https://eos.com/landviewer/" target="_blank">Open LandViewer</a>
</div>

<div class="card">
<h3>✈️ Telegram</h3>
<a class="btn" href="https://web.telegram.org" target="_blank">Open Telegram</a>
</div>

<div class="card">
<h3>𝕏 X</h3>
<a class="btn" href="https://x.com" target="_blank">Open X</a>
</div>

<div class="card">
<h3>📊 INSS</h3>
<a class="btn" href="https://www.inss.org.il/" target="_blank">Open INSS</a>
</div>

<div class="card">
<h3>🇦🇪 ECSSR</h3>
<a class="btn" href="https://www.ecssr.ae/en/home" target="_blank">Open ECSSR</a>
</div>

<div class="card">
<h3>📍 Coordinates</h3>

<div id="coords" class="coords">
Click anywhere on the map
</div>

<button class="btn copybtn" onclick="copyCoords()">
Copy Coordinates
</button>
</div>

</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([24,54],4);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map);

let marker;
let currentCoords="";

map.on('click',function(e){

const lat=e.latlng.lat.toFixed(6);
const lon=e.latlng.lng.toFixed(6);

currentCoords=lat + ", " + lon;

document.getElementById("coords").innerHTML=currentCoords;

if(marker){
map.removeLayer(marker);
}

marker=L.marker([lat,lon]).addTo(map);

});

function copyCoords(){

if(!currentCoords) return;

navigator.clipboard.writeText(currentCoords);

alert("Coordinates copied");
}

function goToCoords(){

const lat=parseFloat(document.getElementById("latBox").value);
const lon=parseFloat(document.getElementById("lonBox").value);

if(isNaN(lat)||isNaN(lon)) return;

map.setView([lat,lon],10);

if(marker){
map.removeLayer(marker);
}

marker=L.marker([lat,lon]).addTo(map);

}

async function searchPlace(){

const q=document.getElementById("searchBox").value;

if(!q) return;

const url=
"https://nominatim.openstreetmap.org/search?format=json&q="
+ encodeURIComponent(q);

const res=await fetch(url);

const data=await res.json();

if(data.length===0){
alert("Location not found");
return;
}

const lat=parseFloat(data[0].lat);
const lon=parseFloat(data[0].lon);

map.setView([lat,lon],10);

if(marker){
map.removeLayer(marker);
}

marker=L.marker([lat,lon]).addTo(map);

}

function updateClock(){
document.getElementById("clock").innerHTML=
new Date().toUTCString();
}

updateClock();
setInterval(updateClock,1000);

</script>

</body>
</html>
```
