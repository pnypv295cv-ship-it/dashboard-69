<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operations Dashboard</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}

h1{
    text-align:center;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
    padding:15px;
}

.card{
    background:#1e1e1e;
    padding:20px;
    border-radius:10px;
}

a{
    color:#4da3ff;
    text-decoration:none;
    font-size:18px;
}
</style>

</head>

<body>

<h1>Personal Operations Dashboard</h1>

<div class="grid">

<div class="card">
<h2>NASA FIRMS</h2>
<a href="https://firms.modaps.eosdis.nasa.gov/map/" target="_blank">
Open NASA FIRMS
</a>
</div>

<div class="card">
<h2>Google Maps</h2>
<a href="https://maps.google.com" target="_blank">
Open Google Maps
</a>
</div>

<div class="card">
<h2>LandViewer</h2>
<a href="https://eos.com/landviewer/" target="_blank">
Open LandViewer
</a>
</div>

<div class="card">
<h2>X</h2>
<a href="https://x.com" target="_blank">
Open X
</a>
</div>

</div>

</body>
</html>
